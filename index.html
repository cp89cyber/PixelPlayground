<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Playground | Sky Scribble</title>
    <meta
      name="description"
      content="Sky Scribble is a static doodle-inspired endless jumper built with HTML, CSS, and JavaScript."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="game-frame" id="game-frame" aria-label="Sky Scribble game">
        <canvas
          id="game-canvas"
          width="400"
          height="600"
          aria-label="Sky Scribble canvas game"
        ></canvas>
      </section>
    </main>
    <noscript>This game needs JavaScript enabled to run.</noscript>
    <script src="js/game.js"></script>
  </body>
</html>
